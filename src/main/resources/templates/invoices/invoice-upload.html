<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Upload Invoice</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <style>
        body { background-color: #f4f6fb; }
        .navbar { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }

        .upload-zone {
            border: 2px dashed #a18cd1;
            border-radius: 16px;
            background: #fdf6ff;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 180px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: #764ba2;
            background: #f3e8ff;
        }

        .upload-zone.has-files {
            border-color: #198754;
            background: #f0fff4;
        }

        .file-chip {
            background: #e8d5f5;
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.82rem;
        }

        #extractingSpinner { display: none; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark shadow-sm">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">
            <i class="bi bi-shop-window"></i> Liquor Inventory
        </span>
    </div>
</nav>

<div class="container mt-4" style="max-width:700px;">

    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h5 class="fw-bold mb-3">Upload Invoice PDF</h5>

            <!-- Drop Zone -->
            <div class="upload-zone d-flex flex-column align-items-center justify-content-center p-4 mb-3 text-center"
                 id="dropZone"
                 onclick="document.getElementById('pdfFiles').click()">

                <i class="bi bi-file-earmark-pdf" style="font-size:3rem;"></i>

                <p class="fw-semibold mt-2">
                    Click or Drag & Drop PDF(s)
                </p>

                <input type="file" id="pdfFiles" accept=".pdf" multiple hidden
                       onchange="handleFileSelect(this)">
            </div>

            <!-- File List -->
            <div id="fileList" style="display:none;">
                <p id="fileCount"></p>
                <div id="fileChips" class="d-flex flex-wrap gap-2"></div>
            </div>

            <!-- Spinner -->
            <div id="extractingSpinner" class="text-center">
                <div class="spinner-border text-primary"></div>
                <p>Processing...</p>
            </div>

            <!-- Button -->
            <button class="btn btn-primary w-100 mt-3"
                    id="uploadBtn"
                    onclick="uploadInvoices()"
                    disabled>
                Upload
            </button>

            <!-- Error -->
            <div id="errorMsg" class="alert alert-danger mt-3 d-none">
                <span id="errorText"></span>
            </div>

        </div>
    </div>
</div>

<script th:inline="javascript">
/* CSRF */
const csrfToken  = /*[[${_csrf.token}]]*/ '';
const csrfHeader = /*[[${_csrf.headerName}]]*/ 'X-CSRF-TOKEN';

let selectedFiles = [];

/* Drag & Drop */
const dropZone = document.getElementById('dropZone');

dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('dragover');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('dragover');
});

dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');

    const files = Array.from(e.dataTransfer.files);
    validateAndSetFiles(files);
});

/* File Select */
function handleFileSelect(input) {
    validateAndSetFiles(Array.from(input.files));
}

/* Validation */
function validateAndSetFiles(files) {

    const valid = files.filter(f => {
        if (!f.name.toLowerCase().endsWith('.pdf')) {
            showError("Only PDF files allowed");
            return false;
        }
        if (f.size > 10 * 1024 * 1024) {
            showError("Max file size 10MB exceeded");
            return false;
        }
        return true;
    });

    if (valid.length === 0) return;

    selectedFiles = valid;
    renderFiles();
}

/* Render */
function renderFiles() {
    const fileList = document.getElementById('fileList');
    const fileChips = document.getElementById('fileChips');
    const fileCount = document.getElementById('fileCount');

    fileList.style.display = 'block';
    fileCount.textContent = selectedFiles.length + " file(s) selected";

    fileChips.innerHTML = '';

    selectedFiles.forEach(f => {
        const chip = document.createElement('span');
        chip.className = 'file-chip';
        chip.textContent = f.name;
        fileChips.appendChild(chip);
    });

    document.getElementById('uploadBtn').disabled = false;
}

/* Upload */
async function uploadInvoices() {

    if (selectedFiles.length === 0) return;

    hideError();

    const btn = document.getElementById('uploadBtn');
    const spinner = document.getElementById('extractingSpinner');

    btn.disabled = true;
    spinner.style.display = 'block';

    try {

        let url = '';
        let formData = new FormData();

        if (selectedFiles.length === 1) {
            url = '/api/invoices/upload';
            formData.append('file', selectedFiles[0]);
        } else {
            url = '/api/invoices/upload/bulk';
            selectedFiles.forEach(f => formData.append('files', f));
        }

        formData.append('uploadedBy', 'bar_owner');

        const response = await fetch(url, {
            method: 'POST',
            headers: csrfToken ? { [csrfHeader]: csrfToken } : {},
            body: formData
        });

        /* 🔥 IMPORTANT FIX */
        if (!response.ok) {
            const text = await response.text();
            throw new Error("Server error: " + text);
        }

        const result = await response.json();

        if (!result.success) {
            throw new Error(result.message || "Upload failed");
        }

        /* Redirect */
        if (selectedFiles.length === 1) {
            window.location.href = '/invoices/' + result.data.invoiceId + '/review';
        } else {
            window.location.href = '/invoices';
        }

    } catch (err) {
        showError(err.message);
        btn.disabled = false;
    } finally {
        spinner.style.display = 'none';
    }
}

/* Error */
function showError(msg) {
    document.getElementById('errorText').textContent = msg;
    document.getElementById('errorMsg').classList.remove('d-none');
}

function hideError() {
    document.getElementById('errorMsg').classList.add('d-none');
}
</script>

</body>
</html>
