<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">
<title>Create Bill</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{background:#f5f6fa;}

.card-main{
border-radius:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.search-dropdown{
position:absolute;
background:white;
border:1px solid #ddd;
border-radius:6px;
width:100%;
max-height:200px;
overflow-y:auto;
z-index:1000;
}

.search-item{
padding:8px 12px;
cursor:pointer;
}

.search-item:hover{
background:#f1f5f9;
}

.total-box{
font-size:22px;
font-weight:bold;
}

.good{
color:green;
font-weight:600;
}

.bad{
color:red;
font-weight:600;
}

.qty-box{
display:flex;
align-items:center;
justify-content:center;
}

.qty-box button{
width:28px;
height:28px;
padding:0;
}

</style>

</head>

<body>

<div class="container mt-4">

<div class="card card-main p-4">

<h3 class="text-danger mb-3">Create Bill</h3>

<form th:action="@{/billing/bills/new}" th:object="${billRequest}" method="post">

<div class="row position-relative">

<div class="col-md-5">

<label class="form-label fw-bold">Search Brand</label>

<input
type="text"
id="brandSearch"
class="form-control"
placeholder="Type brand name">

<div id="searchResults" class="search-dropdown d-none"></div>

</div>

<div class="col-md-3">

<label class="form-label">Size</label>

<select id="sizeSelect" class="form-select">
<option value="">Select Size</option>
</select>

</div>

<div class="col-md-2">

<label class="form-label">Quantity</label>

<input
type="number"
id="qtyInput"
class="form-control"
value="1"
min="1">

</div>

<div class="col-md-2 d-flex align-items-end">

<button
type="button"
class="btn btn-success w-100"
onclick="addItem()">

Add Item

</button>

</div>

</div>

<hr>

<div class="table-responsive">

<table class="table table-bordered">

<thead class="table-light">
<tr>
<th>Brand</th>
<th>Size</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
<th>Remove</th>
</tr>
</thead>

<tbody id="billTableBody"></tbody>

</table>

</div>

<div class="d-flex justify-content-between total-box">
<span>Grand Total</span>
<span>₹ <span id="grandTotal">0.00</span></span>
</div>

<hr>

<div class="row">

<div class="col-md-4">
<label class="form-label">Customer Challan</label>

<input
type="number"
id="challanAmount"
class="form-control"
value="0"
oninput="calculateChallan()">
</div>

<div class="col-md-8 d-flex align-items-end">
<div id="challanResult"></div>
</div>

</div>

<div id="hiddenItems"></div>

<button
type="submit"
class="btn btn-primary w-100 mt-4"
id="saveBtn"
disabled>

Save Bill

</button>

</form>

</div>

</div>

<script th:inline="javascript">

const brands = [[${brands}]];

let selectedBrand = null;
let billItems = [];

const searchInput = document.getElementById("brandSearch");
const resultBox = document.getElementById("searchResults");
const sizeSelect = document.getElementById("sizeSelect");
const qtyInput = document.getElementById("qtyInput");

searchInput.addEventListener("input", function(){

const text = this.value.toLowerCase();

resultBox.innerHTML="";

if(!text){
resultBox.classList.add("d-none");
return;
}

const filtered = brands.filter(b =>
b.name.toLowerCase().includes(text)
);

filtered.forEach(brand => {

const div=document.createElement("div");
div.className="search-item";
div.innerText=brand.name;
div.onclick=()=>selectBrand(brand.id);

resultBox.appendChild(div);

});

resultBox.classList.remove("d-none");

});

function selectBrand(id){

selectedBrand = brands.find(b => b.id == id);

searchInput.value = selectedBrand.name;

resultBox.classList.add("d-none");

sizeSelect.innerHTML = `<option value="">Select Size</option>`;

const sizes = selectedBrand.sizes || selectedBrand.brandSizes || [];

sizes.forEach(size => {

const price = size.sellingPrice || size.price || size.mrp;

sizeSelect.innerHTML +=
`<option
value="${size.id}"
data-price="${price}"
data-label="${size.sizeLabel}">

${size.sizeLabel} - ₹${price}

</option>`;

});

}

qtyInput.addEventListener("keypress",function(e){

if(e.key==="Enter"){
e.preventDefault();
addItem();
}

});

function addItem(){

if(!selectedBrand){
alert("Select brand");
return;
}

const option = sizeSelect.options[sizeSelect.selectedIndex];

if(!option.value){
alert("Select size");
return;
}

const qty = parseInt(qtyInput.value);

const price = parseFloat(option.dataset.price);

const sizeLabel = option.dataset.label;

const brandSizeId = option.value;

const existing = billItems.find(i => i.brandSizeId == brandSizeId);

if(existing){

existing.quantity += qty;
existing.total = existing.quantity * existing.price;

}else{

billItems.push({

brandSizeId:brandSizeId,
brandName:selectedBrand.name,
sizeLabel:sizeLabel,
price:price,
quantity:qty,
total:price*qty

});

}

renderTable();

searchInput.value="";
sizeSelect.innerHTML="<option value=''>Select Size</option>";
qtyInput.value=1;
searchInput.focus();

}

function renderTable(){

const tbody=document.getElementById("billTableBody");
const hidden=document.getElementById("hiddenItems");

tbody.innerHTML="";
hidden.innerHTML="";

let grand=0;

billItems.forEach((item,index)=>{

grand += item.total;

tbody.innerHTML +=

`<tr>

<td>${item.brandName}</td>

<td>${item.sizeLabel}</td>

<td>₹${item.price}</td>

<td>

<div class="qty-box">

<button
type="button"
class="btn btn-sm btn-outline-secondary"
onclick="decreaseQty(${index})">

-

</button>

<span class="mx-2">${item.quantity}</span>

<button
type="button"
class="btn btn-sm btn-outline-secondary"
onclick="increaseQty(${index})">

+

</button>

</div>

</td>

<td>₹${item.total.toFixed(2)}</td>

<td>

<button
type="button"
class="btn btn-danger btn-sm"
onclick="removeItem(${index})">

X

</button>

</td>

</tr>`;

hidden.innerHTML +=

`<input
type="hidden"
name="items[${index}].brandSizeId"
value="${item.brandSizeId}">

<input
type="hidden"
name="items[${index}].quantity"
value="${item.quantity}">`;

});

document.getElementById("grandTotal").innerText = grand.toFixed(2);

document.getElementById("saveBtn").disabled = billItems.length === 0;

calculateChallan();

}

function increaseQty(index){

billItems[index].quantity += 1;

billItems[index].total =
billItems[index].quantity * billItems[index].price;

renderTable();

}

function decreaseQty(index){

if(billItems[index].quantity > 1){

billItems[index].quantity -= 1;

billItems[index].total =
billItems[index].quantity * billItems[index].price;

}else{

billItems.splice(index,1);

}

renderTable();

}

function removeItem(index){

billItems.splice(index,1);

renderTable();

}

function calculateChallan(){

const grand=parseFloat(document.getElementById("grandTotal").innerText)||0;

const challan=parseFloat(document.getElementById("challanAmount").value)||0;

const result=document.getElementById("challanResult");

if(!challan){
result.innerHTML="";
return;
}

if(challan >= grand){

const balance = challan - grand;

result.innerHTML =
`<span class="good">Enough Money (Balance ₹${balance.toFixed(2)})</span>`;

}else{

const shortage = grand - challan;

result.innerHTML =
`<span class="bad">Need ₹${shortage.toFixed(2)} more</span>`;

}

}

</script>

</body>
</html>
